services:
  # 1. API Gateway
  api-gateway:
    build:
      context: ../api-gateway
    container_name: api-gateway-service
    ports:
      - "8080:8080"
    networks:
      - bido-network
    restart: unless-stopped

  # 2. Baza de date PostgreSQL
  postgres-db:
    image: postgres:18
    container_name: postgres-auth
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    networks:
      - bido-network
    #volumes:
      #- postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

networks:
  bido-network:

#volumes:
  #postgres-data: