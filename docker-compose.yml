services:
  api-gateway:
    build:
      context: ../api-gateway
    container_name: api-gateway-service
    ports:
      - "8080:8080"
    networks:
      - bido-network
    restart: unless-stopped

  postgres-auth:
    image: postgres:18
    container_name: postgres-auth
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    networks:
      - bido-network
    #volumes:
      #- postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  auth:
    build:
      context: ../auth
    container_name: auth-service
    expose:
      - "8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-auth:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    networks:
      - bido-network
    restart: unless-stopped
    depends_on:
      - postgres-auth

networks:
  bido-network:

#volumes:
  #postgres-data: